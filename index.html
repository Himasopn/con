<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Media Converter Pro</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #2563eb;
            --primary-dark: #1e40af;
            --success: #059669;
            --danger: #dc2626;
            --bg-primary: #ffffff;
            --bg-secondary: #f9fafb;
            --bg-tertiary: #f3f4f6;
            --text-primary: #111827;
            --text-secondary: #6b7280;
            --border: #e5e7eb;
            --shadow-md: 0 4px 6px rgba(0, 0, 0, 0.07);
            --shadow-lg: 0 10px 15px rgba(0, 0, 0, 0.1);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .header h1 {
            font-size: 42px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .header p {
            color: var(--text-secondary);
            font-size: 14px;
        }

        .tabs {
            display: flex;
            gap: 12px;
            margin-bottom: 32px;
            background: var(--bg-secondary);
            padding: 6px;
            border-radius: 8px;
        }

        .tab-btn {
            flex: 1;
            padding: 10px 20px;
            border: none;
            background: transparent;
            color: var(--text-secondary);
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            border-radius: 6px;
            transition: all 0.2s ease;
        }

        .tab-btn.active {
            background: var(--bg-primary);
            color: var(--primary);
            box-shadow: var(--shadow-md);
        }

        .section {
            display: none;
        }

        .section.active {
            display: block;
        }

        .card {
            background: var(--bg-primary);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 32px;
            box-shadow: var(--shadow-lg);
        }

        .card-title {
            font-size: 14px;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .upload-box {
            border: 2px dashed var(--border);
            border-radius: 8px;
            padding: 40px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s ease;
            background: var(--bg-tertiary);
            margin-bottom: 24px;
        }

        .upload-box:hover {
            border-color: var(--primary);
            background: var(--bg-secondary);
        }

        .upload-box.dragover {
            border-color: var(--primary);
            background: var(--bg-secondary);
        }

        .upload-icon {
            font-size: 48px;
            margin-bottom: 12px;
        }

        .upload-text {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 6px;
        }

        .upload-hint {
            font-size: 12px;
            color: var(--text-secondary);
        }

        input[type="file"] {
            display: none;
        }

        .file-info {
            padding: 12px;
            background: var(--bg-tertiary);
            border-radius: 6px;
            margin-bottom: 20px;
            border-left: 3px solid var(--primary);
            display: none;
        }

        .file-info.show {
            display: block;
        }

        .file-name {
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .file-size {
            font-size: 12px;
            color: var(--text-secondary);
        }

        .grid-2 {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 12px;
            margin-bottom: 24px;
        }

        .btn-option {
            padding: 10px;
            border: 1px solid var(--border);
            background: var(--bg-tertiary);
            color: var(--text-secondary);
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            transition: all 0.2s ease;
        }

        .btn-option:hover {
            border-color: var(--primary);
            color: var(--primary);
        }

        .btn-option.active {
            border-color: var(--primary);
            background: var(--bg-secondary);
            color: var(--primary);
        }

        .slider-box {
            margin-bottom: 20px;
        }

        .slider-label {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 12px;
            font-weight: 600;
            color: var(--text-secondary);
        }

        input[type="range"] {
            width: 100%;
            height: 4px;
            border-radius: 2px;
            background: var(--border);
            outline: none;
            -webkit-appearance: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: var(--primary);
            cursor: pointer;
        }

        input[type="range"]::-moz-range-thumb {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: var(--primary);
            cursor: pointer;
            border: none;
        }

        .preview {
            margin-bottom: 24px;
            padding: 20px;
            background: var(--bg-tertiary);
            border-radius: 8px;
            display: none;
        }

        .preview.show {
            display: block;
        }

        .preview-label {
            font-size: 12px;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 12px;
        }

        .preview img,
        .preview video {
            max-width: 100%;
            max-height: 300px;
            border-radius: 6px;
            margin: 12px 0;
        }

        .message {
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 20px;
            display: none;
            font-size: 12px;
            font-weight: 600;
            border-left: 3px solid;
        }

        .message.show {
            display: block;
        }

        .message.success {
            background: #ecfdf5;
            color: var(--success);
            border-left-color: var(--success);
        }

        .message.error {
            background: #fef2f2;
            color: var(--danger);
            border-left-color: var(--danger);
        }

        .button-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
        }

        .btn-primary:hover:not(:disabled) {
            background: var(--primary-dark);
        }

        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-secondary {
            background: var(--bg-tertiary);
            color: var(--text-secondary);
            border: 1px solid var(--border);
        }

        .btn-secondary:hover {
            background: var(--bg-secondary);
            color: var(--text-primary);
        }

        .progress {
            width: 100%;
            height: 4px;
            background: var(--border);
            border-radius: 2px;
            overflow: hidden;
            margin-bottom: 12px;
            display: none;
        }

        .progress.show {
            display: block;
        }

        .progress-bar {
            height: 100%;
            background: var(--primary);
            width: 0%;
            transition: width 0.3s ease;
        }

        .hidden-options {
            display: none;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid var(--border);
        }

        .hidden-options.show {
            display: block;
        }

        @media (max-width: 640px) {
            .card {
                padding: 20px;
            }

            .button-group {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎬 Media Converter</h1>
            <p>Fast • Simple • Privacy First</p>
        </div>

        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('image', this)">
                🖼️ Image
            </button>
            <button class="tab-btn" onclick="switchTab('video', this)">
                🎥 Video
            </button>
        </div>

        <!-- IMAGE SECTION -->
        <div id="image" class="section active">
            <div class="card">
                <div class="card-title">Image Converter</div>

                <div class="upload-box" id="imageUploadBox" onclick="document.getElementById('imageFile').click()">
                    <div class="upload-icon">📁</div>
                    <div class="upload-text">Click to upload image</div>
                    <div class="upload-hint">JPG, PNG, WebP, BMP</div>
                </div>

                <input type="file" id="imageFile" accept="image/*">

                <div class="file-info" id="imageFileInfo">
                    <div class="file-name" id="imageFileName"></div>
                    <div class="file-size" id="imageFileSize"></div>
                </div>

                <div class="card-title" style="margin-top: 24px;">Format</div>
                <div class="grid-2" id="imageFormats">
                    <button class="btn-option active" data-format="image/png">PNG</button>
                    <button class="btn-option" data-format="image/jpeg">JPG</button>
                    <button class="btn-option" data-format="image/webp">WebP</button>
                </div>

                <div class="card-title" style="margin-top: 24px;">Settings</div>
                
                <div class="slider-box">
                    <div class="slider-label">
                        <span>Quality</span>
                        <span id="qualityVal">85%</span>
                    </div>
                    <input type="range" id="qualitySlider" min="10" max="100" value="85">
                </div>

                <div class="slider-box">
                    <div class="slider-label">
                        <span>Scale</span>
                        <span id="scaleVal">100%</span>
                    </div>
                    <input type="range" id="scaleSlider" min="10" max="200" value="100">
                </div>

                <div class="card-title" style="margin-top: 24px;">Filters</div>
                <div class="grid-2">
                    <button class="btn-option" onclick="applyFilter('grayscale')">Grayscale</button>
                    <button class="btn-option" onclick="applyFilter('sepia')">Sepia</button>
                    <button class="btn-option" onclick="applyFilter('invert')">Invert</button>
                    <button class="btn-option" onclick="applyFilter('brightness')">Bright</button>
                </div>

                <div class="preview" id="imagePreview">
                    <div class="preview-label">Preview</div>
                    <img id="previewImage" alt="preview">
                </div>

                <div class="message" id="imageMessage"></div>
                <div class="progress" id="imageProgress">
                    <div class="progress-bar" id="imageProgressBar"></div>
                </div>

                <div class="button-group">
                    <button class="btn btn-secondary" onclick="resetImage()">Reset</button>
                    <button class="btn btn-primary" id="convertImageBtn" disabled onclick="convertImage()">Download</button>
                </div>
            </div>
        </div>

        <!-- VIDEO SECTION -->
        <div id="video" class="section">
            <div class="card">
                <div class="card-title">Video Processor</div>

                <div class="upload-box" id="videoUploadBox" onclick="document.getElementById('videoFile').click()">
                    <div class="upload-icon">📹</div>
                    <div class="upload-text">Click to upload video</div>
                    <div class="upload-hint">MP4, WebM (Max 200MB)</div>
                </div>

                <input type="file" id="videoFile" accept="video/*">

                <div class="file-info" id="videoFileInfo">
                    <div class="file-name" id="videoFileName"></div>
                    <div class="file-size" id="videoFileSize"></div>
                </div>

                <div class="card-title" style="margin-top: 24px;">Options</div>
                <div class="grid-2">
                    <button class="btn-option active" onclick="selectVideoOption('trim')">Trim</button>
                    <button class="btn-option" onclick="selectVideoOption('compress')">Compress</button>
                    <button class="btn-option" onclick="selectVideoOption('speed')">Speed</button>
                </div>

                <div id="trimSettings" class="hidden-options show">
                    <div class="slider-box">
                        <div class="slider-label">
                            <span>Start (sec)</span>
                            <span id="startVal">0</span>
                        </div>
                        <input type="range" id="startSlider" min="0" value="0">
                    </div>
                    <div class="slider-box">
                        <div class="slider-label">
                            <span>End (sec)</span>
                            <span id="endVal">10</span>
                        </div>
                        <input type="range" id="endSlider" min="0" value="10">
                    </div>
                </div>

                <div id="compressSettings" class="hidden-options">
                    <div class="slider-box">
                        <div class="slider-label">
                            <span>Quality</span>
                            <span id="videoQualityVal">Medium</span>
                        </div>
                        <input type="range" id="videoQualitySlider" min="1" max="3" value="2">
                    </div>
                </div>

                <div id="speedSettings" class="hidden-options">
                    <div class="slider-box">
                        <div class="slider-label">
                            <span>Speed</span>
                            <span id="speedVal">1x</span>
                        </div>
                        <input type="range" id="speedSlider" min="0.5" max="2" step="0.1" value="1">
                    </div>
                </div>

                <div class="preview" id="videoPreview">
                    <div class="preview-label">Video Preview</div>
                    <video id="previewVideo" controls style="max-width: 100%; max-height: 300px;"></video>
                </div>

                <div class="message" id="videoMessage"></div>
                <div class="progress" id="videoProgress">
                    <div class="progress-bar" id="videoProgressBar"></div>
                </div>

                <div class="button-group">
                    <button class="btn btn-secondary" onclick="resetVideo()">Reset</button>
                    <button class="btn btn-primary" id="convertVideoBtn" disabled onclick="convertVideo()">Download</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ========== STATE ==========
        let imageFile = null;
        let videoFile = null;
        let imageCanvas = null;
        let selectedImageFormat = 'image/png';
        let currentFilter = null;

        // ========== TAB SWITCHING ==========
        function switchTab(tabName, btn) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(tabName).classList.add('active');
            btn.classList.add('active');
        }

        // ========== IMAGE HANDLING ==========
        const imageUploadBox = document.getElementById('imageUploadBox');
        const imageFileInput = document.getElementById('imageFile');

        imageUploadBox.addEventListener('dragover', e => {
            e.preventDefault();
            imageUploadBox.classList.add('dragover');
        });

        imageUploadBox.addEventListener('dragleave', () => {
            imageUploadBox.classList.remove('dragover');
        });

        imageUploadBox.addEventListener('drop', e => {
            e.preventDefault();
            imageUploadBox.classList.remove('dragover');
            if (e.dataTransfer.files.length > 0) {
                loadImage(e.dataTransfer.files[0]);
            }
        });

        imageFileInput.addEventListener('change', e => {
            if (e.target.files.length > 0) {
                loadImage(e.target.files[0]);
            }
        });

        function loadImage(file) {
            if (!file.type.startsWith('image/')) {
                showMessage('imageMessage', 'Invalid file', 'error');
                return;
            }

            imageFile = file;
            document.getElementById('imageFileName').textContent = '📄 ' + file.name;
            document.getElementById('imageFileSize').textContent = (file.size / 1024).toFixed(1) + ' KB';
            document.getElementById('imageFileInfo').classList.add('show');

            const reader = new FileReader();
            reader.onload = e => {
                const img = new Image();
                img.onload = () => {
                    imageCanvas = document.createElement('canvas');
                    imageCanvas.width = img.width;
                    imageCanvas.height = img.height;
                    imageCanvas.getContext('2d').drawImage(img, 0, 0);

                    updateImagePreview();
                    document.getElementById('convertImageBtn').disabled = false;
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        function updateImagePreview() {
            if (!imageCanvas) return;

            const quality = parseInt(document.getElementById('qualitySlider').value) / 100;
            const scale = parseInt(document.getElementById('scaleSlider').value) / 100;

            const canvas = document.createElement('canvas');
            canvas.width = imageCanvas.width * scale;
            canvas.height = imageCanvas.height * scale;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(imageCanvas, 0, 0, canvas.width, canvas.height);

            if (currentFilter) {
                applyCanvasFilter(ctx, canvas.width, canvas.height, currentFilter);
            }

            document.getElementById('previewImage').src = canvas.toDataURL();
            document.getElementById('imagePreview').classList.add('show');
        }

        function applyCanvasFilter(ctx, w, h, filter) {
            const imgData = ctx.getImageData(0, 0, w, h);
            const data = imgData.data;

            for (let i = 0; i < data.length; i += 4) {
                const r = data[i], g = data[i + 1], b = data[i + 2];

                switch(filter) {
                    case 'grayscale':
                        const gray = r * 0.3 + g * 0.59 + b * 0.11;
                        data[i] = data[i + 1] = data[i + 2] = gray;
                        break;
                    case 'sepia':
                        data[i] = Math.min(255, r * 0.393 + g * 0.769 + b * 0.189);
                        data[i + 1] = Math.min(255, r * 0.349 + g * 0.686 + b * 0.168);
                        data[i + 2] = Math.min(255, r * 0.272 + g * 0.534 + b * 0.131);
                        break;
                    case 'invert':
                        data[i] = 255 - r;
                        data[i + 1] = 255 - g;
                        data[i + 2] = 255 - b;
                        break;
                    case 'brightness':
                        data[i] = Math.min(255, r * 1.2);
                        data[i + 1] = Math.min(255, g * 1.2);
                        data[i + 2] = Math.min(255, b * 1.2);
                        break;
                }
            }

            ctx.putImageData(imgData, 0, 0);
        }

        function applyFilter(name) {
            currentFilter = currentFilter === name ? null : name;
            document.querySelectorAll('[onclick*="applyFilter"]').forEach(b => b.classList.remove('active'));
            if (currentFilter) {
                event.target.classList.add('active');
            }
            updateImagePreview();
        }

        document.getElementById('qualitySlider').addEventListener('input', e => {
            document.getElementById('qualityVal').textContent = e.target.value + '%';
            updateImagePreview();
        });

        document.getElementById('scaleSlider').addEventListener('input', e => {
            document.getElementById('scaleVal').textContent = e.target.value + '%';
            updateImagePreview();
        });

        // Select format
        document.querySelectorAll('#imageFormats .btn-option').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('#imageFormats .btn-option').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                selectedImageFormat = this.dataset.format;
            });
        });

        function convertImage() {
            if (!imageCanvas) return;

            const quality = parseInt(document.getElementById('qualitySlider').value) / 100;
            const scale = parseInt(document.getElementById('scaleSlider').value) / 100;

            const canvas = document.createElement('canvas');
            canvas.width = imageCanvas.width * scale;
            canvas.height = imageCanvas.height * scale;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(imageCanvas, 0, 0, canvas.width, canvas.height);

            if (currentFilter) {
                applyCanvasFilter(ctx, canvas.width, canvas.height, currentFilter);
            }

            showProgress('imageProgress');

            setTimeout(() => {
                canvas.toBlob(blob => {
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    const ext = selectedImageFormat === 'image/jpeg' ? '.jpg' : '.' + selectedImageFormat.split('/')[1];
                    a.href = url;
                    a.download = (imageFile.name.split('.')[0]) + ext;
                    a.click();
                    URL.revokeObjectURL(url);

                    hideProgress('imageProgress');
                    showMessage('imageMessage', '✓ Downloaded successfully!', 'success');
                }, selectedImageFormat, quality);
            }, 300);
        }

        function resetImage() {
            imageFile = null;
            imageCanvas = null;
            currentFilter = null;
            imageFileInput.value = '';
            document.getElementById('imageFileInfo').classList.remove('show');
            document.getElementById('imagePreview').classList.remove('show');
            document.getElementById('convertImageBtn').disabled = true;
            document.getElementById('qualitySlider').value = 85;
            document.getElementById('scaleSlider').value = 100;
            document.getElementById('qualityVal').textContent = '85%';
            document.getElementById('scaleVal').textContent = '100%';
        }

        // ========== VIDEO HANDLING ==========
        const videoUploadBox = document.getElementById('videoUploadBox');
        const videoFileInput = document.getElementById('videoFile');

        videoUploadBox.addEventListener('dragover', e => {
            e.preventDefault();
            videoUploadBox.classList.add('dragover');
        });

        videoUploadBox.addEventListener('dragleave', () => {
            videoUploadBox.classList.remove('dragover');
        });

        videoUploadBox.addEventListener('drop', e => {
            e.preventDefault();
            videoUploadBox.classList.remove('dragover');
            if (e.dataTransfer.files.length > 0) {
                loadVideo(e.dataTransfer.files[0]);
            }
        });

        videoFileInput.addEventListener('change', e => {
            if (e.target.files.length > 0) {
                loadVideo(e.target.files[0]);
            }
        });

        function loadVideo(file) {
            if (!file.type.startsWith('video/')) {
                showMessage('videoMessage', 'Invalid file', 'error');
                return;
            }

            if (file.size > 200 * 1024 * 1024) {
                showMessage('videoMessage', 'File too large (max 200MB)', 'error');
                return;
            }

            videoFile = file;
            document.getElementById('videoFileName').textContent = '📹 ' + file.name;
            document.getElementById('videoFileSize').textContent = (file.size / 1024 / 1024).toFixed(1) + ' MB';
            document.getElementById('videoFileInfo').classList.add('show');

            const url = URL.createObjectURL(file);
            const video = document.createElement('video');
            
            video.addEventListener('loadedmetadata', () => {
                const duration = Math.floor(video.duration);
                document.getElementById('startSlider').max = duration;
                document.getElementById('endSlider').max = duration;
                document.getElementById('endSlider').value = duration;
                document.getElementById('endVal').textContent = duration;

                document.getElementById('previewVideo').src = url;
                document.getElementById('videoPreview').classList.add('show');
                document.getElementById('convertVideoBtn').disabled = false;
            });

            video.addEventListener('error', () => {
                showMessage('videoMessage', 'Error loading video', 'error');
            });

            video.src = url;
        }

        function selectVideoOption(option) {
            document.querySelectorAll('[onclick*="selectVideoOption"]').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');

            document.getElementById('trimSettings').classList.remove('show');
            document.getElementById('compressSettings').classList.remove('show');
            document.getElementById('speedSettings').classList.remove('show');

            if (option === 'trim') document.getElementById('trimSettings').classList.add('show');
            if (option === 'compress') document.getElementById('compressSettings').classList.add('show');
            if (option === 'speed') document.getElementById('speedSettings').classList.add('show');
        }

        document.getElementById('startSlider').addEventListener('input', e => {
            document.getElementById('startVal').textContent = e.target.value;
        });

        document.getElementById('endSlider').addEventListener('input', e => {
            document.getElementById('endVal').textContent = e.target.value;
        });

        document.getElementById('videoQualitySlider').addEventListener('input', e => {
            const qualities = ['Low', 'Medium', 'High'];
            document.getElementById('videoQualityVal').textContent = qualities[e.target.value - 1];
        });

        document.getElementById('speedSlider').addEventListener('input', e => {
            document.getElementById('speedVal').textContent = e.target.value + 'x';
        });

        function convertVideo() {
            if (!videoFile) return;

            showProgress('videoProgress');

            setTimeout(() => {
                const url = URL.createObjectURL(videoFile);
                const a = document.createElement('a');
                a.href = url;
                a.download = videoFile.name;
                a.click();

                setTimeout(() => URL.revokeObjectURL(url), 100);
                hideProgress('videoProgress');
                showMessage('videoMessage', '✓ Downloaded successfully!', 'success');
            }, 500);
        }

        function resetVideo() {
            videoFile = null;
            videoFileInput.value = '';
            document.getElementById('videoFileInfo').classList.remove('show');
            document.getElementById('videoPreview').classList.remove('show');
            document.getElementById('convertVideoBtn').disabled = true;
        }

        // ========== HELPERS ==========
        function showMessage(id, text, type) {
            const el = document.getElementById(id);
            el.textContent = text;
            el.className = 'message show ' + type;
            setTimeout(() => el.classList.remove('show'), 3000);
        }

        function showProgress(id) {
            const progress = document.getElementById(id);
            const bar = progress.querySelector('.progress-bar');
            progress.classList.add('show');
            bar.style.width = '0%';
            setTimeout(() => bar.style.width = '100%', 100);
        }

        function hideProgress(id) {
            document.getElementById(id).classList.remove('show');
        }
    </script>
</body>
</html>
